<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Interaktives OT-Security-Werkzeug: prüft die 72-Stunden-Inselbetriebsfähigkeit eines Werks entlang von 14 Abhängigkeiten und erzeugt einen druckbaren Steckbrief. Läuft vollständig lokal im Browser.">

<title>Island-Mode-72h-Stresstest · Companion zum Buch</title>
<style>
/* Lokale Schriften — kein Abruf bei Google Fonts (vgl. LG München I, 3 O 17493/20) · SIL OFL 1.1 */
@font-face{font-family:'Fraunces';src:url('fonts/fraunces-latin-opsz-normal.woff2') format('woff2-variations'),url('fonts/fraunces-latin-opsz-normal.woff2') format('woff2');font-weight:100 900;font-style:normal;font-display:swap;}
@font-face{font-family:'JetBrains Mono';src:url('fonts/jetbrains-mono-latin-wght-normal.woff2') format('woff2-variations'),url('fonts/jetbrains-mono-latin-wght-normal.woff2') format('woff2');font-weight:100 800;font-style:normal;font-display:swap;}
:root{--red:#2240c4;--red-soft:#dfe4fa;--ink:#181840;--paper:#f5f6fb;--line:#d8dcef;--muted:#5d6184;
--ok:#1d8a5f;--teil:#b97e0a;--offen:#d6246e;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'JetBrains Mono',monospace;background:var(--paper);color:var(--ink);line-height:1.5;
background-image:radial-gradient(var(--line) .5px,transparent .5px);background-size:22px 22px;}
.wrap{max-width:1180px;margin:0 auto;padding:38px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:18px;margin-bottom:18px;}
.kicker{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--red);font-weight:600;}
h1{font-family:'Fraunces',serif;font-weight:800;font-size:clamp(24px,4.2vw,40px);line-height:1.05;margin:8px 0 10px;}
.sub{font-size:13px;color:var(--muted);max-width:880px;}
.sig{color:var(--red);font-weight:600;}
.ref{font-size:11px;color:var(--muted);font-style:italic;margin-top:6px;}
h2{font-family:'Fraunces',serif;font-size:20px;margin:26px 0 6px;}
.note{font-size:12px;color:var(--muted);margin-bottom:10px;max-width:880px;}
details{margin:12px 0;background:#fff;border:1px solid var(--line);padding:10px 14px;}
summary{cursor:pointer;font-weight:600;font-size:12px;}
details p,details li{font-size:11.5px;color:var(--muted);margin-top:6px;}
details ul{margin-left:18px;}
.btn{font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
padding:10px 15px;border:1px solid var(--ink);background:var(--ink);color:#fff;cursor:pointer;transition:.15s;}
.btn.ghost{background:transparent;color:var(--ink);} .btn:hover{background:var(--red);border-color:var(--red);color:#fff;}
.toolbar{display:flex;gap:9px;flex-wrap:wrap;margin:24px 0 0;align-items:center;}
.warn{background:#fff7e6;border:1px solid #b97e0a;color:#7a5306;font-size:11.5px;padding:9px 12px;margin:10px 0;}
footer{margin-top:34px;border-top:1px solid var(--line);padding-top:15px;font-size:11px;color:var(--muted);line-height:1.7;}

/* Bestandsaufnahme */
.werkbar{display:flex;gap:14px;flex-wrap:wrap;align-items:center;background:#fff;border:1px solid var(--ink);padding:10px 14px;margin:12px 0;}
.werkbar label{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);font-weight:600;}
.werkbar input{border:1px solid var(--line);background:var(--paper);font-family:inherit;font-size:12px;padding:4px 6px;}
.werkbar input.w{min-width:240px;}
.q{background:#fff;border:1px solid var(--line);padding:10px 14px;margin:9px 0;}
.q .qt{font-size:12px;font-weight:600;margin-bottom:7px;}
.q .qt b{color:var(--red);}
.opts{display:flex;flex-wrap:wrap;gap:6px;}
.opt{font-size:11.5px;padding:5px 10px;border:1px solid var(--line);background:var(--paper);cursor:pointer;border-radius:2px;}
.opt:hover{border-color:var(--ink);}
.opt.sel{background:var(--ink);color:#fff;border-color:var(--ink);}

/* Fahrplan */
.headline{background:var(--ink);color:#fff;padding:12px 16px;margin-top:8px;display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;}
.headline .t{font-family:'Fraunces',serif;font-weight:800;font-size:18px;}
.headline .next{font-size:11px;color:var(--red-soft);}
.stage{background:#fff;border:1px solid var(--ink);border-top:0;}
.stage:first-of-type{border-top:1px solid var(--ink);}
.stagehead{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.stagehead .sn{font-family:'Fraunces',serif;font-weight:800;font-size:15px;}
.stagehead .st{font-weight:600;font-size:13px;flex:1;min-width:150px;}
.pill{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#fff;padding:3px 9px;}
.stagebody{padding:10px 14px;}
.gap{font-size:11.5px;margin-bottom:9px;}
.gap b{color:var(--red);}
.tmpl{background:var(--paper);border:1px solid var(--line);margin-top:8px;}
.tmplhead{font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:600;padding:7px 11px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:8px;}
.tmplbody{padding:10px 12px;font-size:11.5px;}
.tmplbody ul{margin-left:17px;}
.tmplbody li{margin:3px 0;}
.tmplbody pre{white-space:pre-wrap;font-family:inherit;font-size:11px;line-height:1.55;}
.copybtn,.csvbtn{font-family:inherit;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;padding:4px 9px;border:1px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;}
.copybtn:hover,.csvbtn:hover{background:var(--ink);color:#fff;}
.legalbox{border:1px solid var(--teil);background:#fff7e6;padding:9px 12px;margin-top:8px;font-size:11.5px;color:#7a5306;}
.legalbox b{color:#7a5306;}
.disc{font-size:10.5px;color:var(--muted);font-style:italic;margin-top:7px;}
.audit{font-size:11px;color:var(--muted);}
.audit td{border:1px solid var(--line);padding:4px 7px;}
.audit table{border-collapse:collapse;width:100%;background:#fff;margin-top:5px;}
.audit th{background:var(--ink);color:#fff;font-size:10px;padding:4px 7px;text-align:left;}

.print-only{display:none;}
@media print{
  body{background:none;}
  .wrap{padding:0;max-width:none;}
  .noprint{display:none!important;}
  .print-only{display:block;}
  .tmpl,.stage,.q{break-inside:avoid;}
  @page{margin:14mm;}
}
.langsw{position:absolute;top:0;right:0;display:flex;border:1px solid var(--ink);}
.langsw button{font-family:inherit;font-size:11px;font-weight:600;padding:5px 11px;border:0;background:transparent;color:var(--ink);cursor:pointer;letter-spacing:1px;}
.langsw button.on{background:var(--ink);color:#fff;}
@media print{.langsw{display:none}}

/* Steckbrief (aus No-Touch übernommen) */
/* Operativer Aushang (Druck-Endprodukt) */
.poster{background:#fff;border:3px solid var(--ink);margin-top:8px;}
.poster-band{background:var(--red);color:#fff;padding:11px 16px;display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:6px;}
.poster-band .t{font-family:'Fraunces',serif;font-weight:800;font-size:19px;}
.poster-band .s{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;}
.poster-intro{padding:9px 16px;font-size:11px;color:var(--ink);border-bottom:1px solid var(--line);background:var(--red-soft);}
.ptable{width:100%;border-collapse:collapse;font-size:11px;}
.ptable th,.ptable td{border:1px solid var(--line);padding:7px 9px;vertical-align:top;text-align:left;}
.ptable th{background:var(--ink);color:#fff;font-size:9.5px;letter-spacing:.5px;}
.ptable td.cjname{font-weight:600;}
.ptable .veto-list{color:var(--veto);font-weight:600;}
.ptable .fall-txt{color:var(--fall);}
.ptable .esc-txt b{color:var(--ink);}
.freibox{padding:10px 16px;border-top:2px solid var(--ink);font-size:11px;}
.freibox .h{font-weight:600;color:var(--frei);text-transform:uppercase;letter-spacing:.5px;font-size:10px;margin-bottom:5px;}
.freibox ul{margin-left:16px;color:var(--muted);}
.poster-foot{padding:8px 16px;border-top:1px solid var(--line);font-size:9.5px;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.poster{border-width:2px;}
body.a3 .poster{font-size:13px;}
.ptable .pill{display:inline-block;color:#fff;font-size:9px;font-weight:700;letter-spacing:.5px;padding:2px 7px;text-transform:uppercase;}
:root{--ok:#1d8a5f;}
body.printobs .wrap>*{display:none!important}
body.printobs .poster{display:block!important}
@media print{.poster{break-inside:avoid;}}

/* ================= Reihen-Design v2 (Buchcover) ================= */
header.sf-cover{position:relative;overflow:hidden;background:#0a0a33;border-bottom:0;padding:0;margin:0;}
.sf-cover svg.plx{position:absolute;inset:0;width:100%;height:100%;}
.sf-cover-in{position:relative;max-width:1180px;margin:0 auto;padding:46px 20px 34px;}
.sf-cover .kicker{color:#41cdf4;}
.sf-cover h1{color:#fff;text-shadow:0 1px 14px rgba(6,6,31,.55);}
.sf-cover .sub{color:#ccd1f2;}
.sf-cover .sig{color:#ff5fa8;}
.sf-cover .ref{color:#9aa0d6;}
.sf-cover .langsw{position:absolute;top:18px;right:20px;border:1px solid rgba(232,234,255,.45);}
.sf-cover .langsw button{color:#e8eaff;}
.sf-cover .langsw button.on{background:#e8eaff;color:#10104a;}
.sf-rule{height:4px;background:linear-gradient(90deg,#d6246e,#7a5cff 35%,#41cdf4 72%,#2fe39b);}
.wrap{padding-top:26px;}
.sf-glance{background:#fff;border:1px solid var(--line);border-left:4px solid var(--red);padding:16px 18px 8px;margin:6px 0 20px;}
.sf-glh{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--red);font-weight:600;margin-bottom:8px;}
.sf-glg{display:grid;grid-template-columns:1fr;margin:0;}
.sf-glg>div{display:grid;grid-template-columns:92px 1fr;gap:12px;padding:7px 0;border-top:1px dashed var(--line);}
.sf-glg>div:first-child{border-top:0;}
.sf-glg dt{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:600;padding-top:2px;}
.sf-glg dd{font-size:12.5px;margin:0;line-height:1.55;}
.sf-legal{margin-top:30px;border-top:1px solid var(--line);padding-top:14px;font-size:10.5px;color:var(--muted);line-height:1.65;max-width:980px;}
.sf-legal a{color:var(--muted);}
.sf-footband{position:relative;overflow:hidden;background:#0a0a33;margin-top:42px;}
.sf-footband svg.plx{position:absolute;inset:0;width:100%;height:100%;opacity:.9;}
.sf-foot-in{position:relative;max-width:1180px;margin:0 auto;padding:26px 20px 30px;}
.sf-foot-in footer{margin:0;border:0;padding:0;font-size:11px;color:#c7cbee;line-height:1.7;}
.sf-foot-in footer b{color:#fff;}
.sf-foot-in footer a{color:#9fd9f6;}
.sf-colo{margin-top:14px;padding-top:12px;border-top:1px solid rgba(199,203,238,.28);font-size:10.5px;color:#9aa0d6;line-height:1.9;}
.sf-colo a{color:#c7cbee;}
.sf-printhead{display:none;}
@keyframes sfPulse{0%,100%{opacity:.55}50%{opacity:1}}
.plx .ndp{animation:sfPulse 5s ease-in-out infinite;}
@media (prefers-reduced-motion:reduce){.plx .ndp{animation:none;}}
:focus-visible{outline:2px solid var(--red);outline-offset:2px;}
@media print{
 .noprint,header.sf-cover,.sf-rule,.sf-glance,.sf-legal,.sf-footband{display:none!important}
 .sf-printhead{display:block;text-align:center;font-size:10px;color:#000;margin-bottom:6px;}
}
@media (max-width:620px){
 .sf-cover-in{padding:40px 16px 26px;}
 .sf-glg>div{grid-template-columns:1fr;gap:2px;}
 .sf-cover .langsw{top:12px;right:12px;}
}
</style>

de:{
 title:"Island-Mode-72h-Stresstest · Companion zum Buch",
 kicker:"OT-Security · Companion zum Buch",
 h1:"Island-Mode-72h-Stresstest",
 sub:"<b>Überlebt Ihre Produktion 72 Stunden ohne Office-IT?</b> Island-Mode ist die Fähigkeit, das Werk auch ohne Anbindung an die Konzern-IT eine definierte Zeit weiterzubetreiben. Dieser Stresstest prüft die vierzehn versteckten Abhängigkeiten, an denen Inselbetrieb in der Praxis scheitert — und erzeugt einen druckbaren <b>Inselbetriebs-Steckbrief</b> je Werk. <span class='sig'>§</span> Alles bleibt im Browser.",
 ref:"Methodik nach „ISMS für die Industrie\u201c, Kap. 24.3 (Island-Mode), 24.3.1 (Vorbereitung), 24.3.2 (Test), 24.1 (RTO/RPO) und 24.2 (3-2-1-Regel). Querverweis: Kap. 9 — ein sicherer Rückfall im No-Touch-Register setzt autarken Inselbetrieb voraus.",
 dsum:"Warum 72 Stunden — und warum die meisten Werke früher stoppen (lesen)",
 dbody:"<p><b>Die Prämisse (Kap. 24.3):</b> Die Office-IT ist weg — durch Ransomware, durch Containment („kontrollierter Shutdown\u201c) oder durch einen Ausfall. Kontinuierliche Prozesse können nicht einfach stoppen; das Werk muss autark weiterlaufen. Voraussetzung ist, dass SCADA, HMIs und SPSen lokal funktionieren — Steuerungs-Logik darf nicht in Cloud-Diensten oder zentralen Konzern-Servern liegen.</p><p><b>Warum 72 Stunden als Prüfhorizont:</b> Es ist die Spanne, in der ein Vorfall typischerweise von der Frühwarnung (24 h) bis zur konkretisierten Folgemeldung (72 h, §32 BSIG) reift — und die realistische Mindestdauer, bis eine kompromittierte Office-Umgebung kontrolliert wieder bereitsteht. Das Buch fragt weiter: Tage, Wochen? 72 Stunden sind die Untergrenze, nicht das Ziel.</p><p><b>Woran Inselbetrieb wirklich scheitert:</b> Selten an der SPS — fast immer an versteckten Abhängigkeiten: Anmeldung über das zentrale AD, Lizenz-Heartbeats, Etikettendruck aus dem ERP, fail-closed konfigurierte Schutzagenten, VoIP-Telefonie, Dokumentation im Intranet, Zutrittskontrolle am Office-Server. Genau diese Kette prüft der Stresstest — Frage für Frage, mit Stunden-bis-Wirkung.</p><p><b>Ein nie getesteter Inselbetrieb trägt nicht</b> (Kap. 24.3.2): Geplante Trennung einmal jährlich, vier bis acht Stunden. Beobachten: Welche Funktionen brechen weg? Wer merkt es zuerst? Welche Workarounds funktionieren? Ohne Test bleibt jedes Ergebnis hier „bedingt\u201c.</p>",

 h2b:"Schritt 2 — Urteil und Inselbetriebs-Steckbrief",
 noteb:"Der Steckbrief ist das Aushang-Pendant zum No-Touch-Register: eine A4-Seite je Werk für Leitwarte, SOC und Werksleitung. Druckansicht erzeugt das vollständige PDF; der Steckbrief lässt sich auch separat drucken.",
 printline:"Inselbetriebs-Steckbrief · generiert mit dem Companion zum Buch „ISMS für die Industrie\u201c",
 bsave:"Speichern (JSON)",bload:"Laden (JSON)",bcsv:"Export CSV",bposter:"Nur Steckbrief drucken",bprint:"Drucken / PDF",
 sfGlance:"<div class='sf-glh'>Auf einen Blick</div><dl class='sf-glg'><div><dt>Zweck</dt><dd>Prüft, ob ein Werk 72 Stunden ohne Office-IT weiterproduzieren kann — entlang der vierzehn versteckten Abhängigkeiten, an denen Inselbetrieb in der Praxis scheitert.</dd></div><div><dt>Bedienung</dt><dd>Werk und Stichtag eintragen, je Abhängigkeit die zutreffende Aussage anklicken; optional Stillstandskosten je Stunde hinterlegen, um das Risiko in Euro zu beziffern.</dd></div><div><dt>Ergebnis</dt><dd>Ein klares Urteil (inselfähig / eingeschränkt / Abbruch nach x Stunden), ein druckbarer Inselbetriebs-Steckbrief je Werk und eine nach Wirkungseintritt priorisierte Maßnahmenliste — als CSV exportierbar.</dd></div></dl>",
 sfLegal:"<b>Hinweise zur Nutzung (Disclaimer).</b> Dieses Werkzeug ist eine methodische Arbeitshilfe zur Selbsteinschätzung und Dokumentation. Es ersetzt keine individuelle Sicherheits- oder Rechtsberatung, keine Risikoanalyse und keine technische Verifikation vor Ort. Normverweise dienen der Orientierung und stellen keine Konformitätsaussage dar. Die Ergebnisse beruhen ausschließlich auf den eigenen Eingaben; alle Angaben ohne Gewähr. Die Nutzung erfolgt in eigener Verantwortung; eine Haftung für Richtigkeit, Vollständigkeit, Aktualität und Eignung für einen bestimmten Zweck ist — soweit gesetzlich zulässig — ausgeschlossen.",
 sfColo:"© Sabine Frömling · <a href='https://creativecommons.org/licenses/by-nc-nd/4.0/deed.de' rel='license'>CC BY-NC-ND 4.0</a> · Companion-Reihe: <a href='https://sabinefroemling-tech.github.io/crown-jewels-companion/'>Crown-Jewels</a> · <a href='https://sabinefroemling-tech.github.io/no-touch-register/'>No-Touch-Register</a> · <a href='https://sabinefroemling-tech.github.io/jit-fernwartung-fahrplan/'>JIT-Fernwartungs-Fahrplan</a> · <a href='https://sabinefroemling-tech.github.io/ot-remote-access-compass/'>Fernzugriffs-Kompass</a> · <a href='https://sabinefroemling-tech.github.io/ot-tabletop-generator/'>Tabletop-Generator</a>",
 foot:"Methodik nach „ISMS für die Industrie\u201c, Kap. 24.3. Island-Mode ist kein Produkt, sondern eine Architektur- und Organisationsfähigkeit: lokale Autarkie von SCADA/HMI/SPS, lokale Authentisierung, lokal bedienbare Wiederherstellung, lokale Krisenkommunikation, definierte Dauer mit Reservevorräten — und ein jährlicher Test. Cyber-Wiederanlauf gehört in die bestehende Schwarzstart-Anweisung integriert, nicht in ein Paralleldokument (Kap. 24.3). Ergebnisse sind Selbstauskunft und ersetzen keine technische Verifikation.<br><span class='sig'>§</span> Sabine Frömling — Independent OT-Security &amp; Compliance Advisory.",

en:{
 title:"Island Mode 72-Hour Stress Test · Book companion",
 kicker:"OT Security · Book companion",
 h1:"Island Mode 72-Hour Stress Test",
 sub:"<b>Does your production survive 72 hours without office IT?</b> Island mode is the ability to keep the plant running for a defined time without any link to corporate IT. This stress test checks the fourteen hidden dependencies where island operation fails in practice — and produces a printable <b>island-mode profile sheet</b> per plant. <span class='sig'>§</span> Everything stays in your browser.",
 ref:"Methodology per \u201cIndustrial ISMS for OT Environments\u201d, ch. 17.3 (island mode: preparation & testing), 17.1 (RTO/RPO) and 17.2 (3-2-1 rule). Cross-reference: ch. 14 — a safe fallback in the no-touch register presupposes autonomous island operation.",
 dsum:"Why 72 hours — and why most plants stop earlier (read me)",
 dbody:"<p><b>The premise (ch. 17.3):</b> office IT is gone — through ransomware, through containment (\u201ccontrolled shutdown\u201d) or through an outage. Continuous processes cannot simply stop; the plant must keep running autonomously. The precondition: SCADA, HMIs and PLCs must work locally — control logic must not live in cloud services or central corporate servers.</p><p><b>Why 72 hours as the test horizon:</b> it is the span in which an incident typically matures from early warning (24 h) to the substantiated follow-up report (72 h, §32 BSIG — the German NIS2 regime), and the realistic minimum time until a compromised office environment is back in a controlled state. The book asks further: days, weeks? 72 hours is the floor, not the target.</p><p><b>Where island operation really fails:</b> rarely at the PLC — almost always at hidden dependencies: logins via central AD, licence heartbeats, label printing from the ERP, fail-closed protection agents, VoIP telephony, documentation on the intranet, access control on an office server. Exactly this chain is what the stress test checks — question by question, with hours-to-impact.</p><p><b>An island mode never tested does not hold</b> (ch. 17.3, testing): a planned disconnection once a year, four to eight hours. Observe: which functions break? Who notices first? Which workarounds hold? Without a test, every result here stays \u201cconditional\u201d.</p>",
 h2a:"Step 1 — The fourteen dependencies",
 lWerk:"Plant / site",phWerk:"e.g. Hanover plant",lDatum:"As of",lRate:"Downtime cost €/h (optional)",phRate:"e.g. 250000",lLastTest:"Last island-mode test (optional)",
 h2b:"Step 2 — Verdict and island-mode profile sheet",
 noteb:"The profile sheet is the poster counterpart to the no-touch register: one A4 page per plant for the control room, the SOC and plant management. The print view produces the full PDF; the sheet can also be printed on its own.",
 printline:"Island-mode profile sheet · generated with the companion to the book \u201cIndustrial ISMS for OT Environments\u201d",
 bsave:"Save (JSON)",bload:"Load (JSON)",bcsv:"Export CSV",bposter:"Print sheet only",bprint:"Print / PDF",
 sfGlance:"<div class='sf-glh'>At a glance</div><dl class='sf-glg'><div><dt>Purpose</dt><dd>Checks whether a plant can keep producing for 72 hours without office IT — along the fourteen hidden dependencies where island operation fails in practice.</dd></div><div><dt>How to use</dt><dd>Enter plant and date, click the matching statement per dependency; optionally add downtime cost per hour to express the risk in euros.</dd></div><div><dt>Result</dt><dd>A clear verdict (island-capable / degraded / halt after x hours), a printable island-mode profile sheet per plant and an action list prioritised by hours-to-impact — exportable as CSV.</dd></div></dl>",
 sfLegal:"<b>Usage notes (disclaimer).</b> This tool is a methodical working aid for self-assessment and documentation. It replaces neither individual security or legal advice, nor a risk analysis, nor on-site technical verification. References to standards are for orientation and are not a statement of conformity. Results are based solely on your own input; all information is provided without warranty. Use is at your own responsibility; liability for accuracy, completeness, currency and fitness for a particular purpose is — to the extent legally permissible — excluded.",
 sfColo:"© Sabine Frömling · <a href='https://creativecommons.org/licenses/by-nc-nd/4.0/deed.en' rel='license'>CC BY-NC-ND 4.0</a> · Companion series: <a href='https://sabinefroemling-tech.github.io/crown-jewels-companion/?lang=en'>Crown Jewels</a> · <a href='https://sabinefroemling-tech.github.io/no-touch-register/?lang=en'>No-Touch Register</a> · <a href='https://sabinefroemling-tech.github.io/jit-fernwartung-fahrplan/?lang=en'>JIT Remote-Maintenance Roadmap</a> · <a href='https://sabinefroemling-tech.github.io/ot-remote-access-compass/?lang=en'>Remote-Access Compass</a> · <a href='https://sabinefroemling-tech.github.io/ot-tabletop-generator/?lang=en'>Tabletop Generator</a>",
 foot:"Methodology per \u201cIndustrial ISMS for OT Environments\u201d, ch. 17.3. Island mode is not a product but an architecture and organisational capability: local autonomy of SCADA/HMI/PLC, local authentication, locally operable recovery, local crisis communication, a defined duration with reserve stocks — and an annual test. Cyber restart belongs integrated into the existing black-start procedure, not in a parallel document (ch. 17.3). Results are self-assessment and do not replace technical verification. German edition: „ISMS für die Industrie – Der Praxisratgeber“ (Springer Vieweg, 2026).<br><span class='sig'>§</span> Sabine Frömling — Independent OT Security &amp; Compliance Advisory.",

const opt=v=>lang==="en"?(OPT_EN[v]||v):v;
let lang="de";
const L=()=>TXT[lang];

/* ================= State ================= */
let state={};
function initState(){state={werk:"",datum:todayISO(),rate:"",lasttest:"",ans:{}};DEPS.forEach(d=>state.ans[d.key]=null);}
function todayISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtDate(iso){if(!iso)return '';const p=String(iso).split('-');if(p.length!==3)return iso;return lang==="en"?p[0]+'-'+p[1]+'-'+p[2]:p[2]+'.'+p[1]+'.'+p[0];}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function werkName(){return (state.werk&&state.werk.trim())?state.werk.trim():(lang==="en"?"[plant name]":"[Werkname]");}
function getOpt(key){const d=DEPS.find(x=>x.key===key);return d?d.opts.find(o=>o.v===state.ans[key])||null:null;}

/* ================= i18n ================= */
function applyLang(){
  document.documentElement.lang=lang;
  document.title=L().title;
  document.querySelectorAll("[data-t]").forEach(el=>el.innerHTML=L()[el.dataset.t]);
  document.getElementById("werk").placeholder=L().phWerk;
  document.getElementById("rate").placeholder=L().phRate;
  document.getElementById("lde").classList.toggle("on",lang==="de");
  document.getElementById("len").classList.toggle("on",lang==="en");
}
function setLang(l){lang=l;try{const u=new URL(location);u.searchParams.set('lang',l);history.replaceState(null,'',u);}catch(e){}applyLang();renderQuestions();renderOut();}

/* ================= Fragen ================= */
function renderQuestions(){
  const wrap=document.getElementById('questions');wrap.innerHTML='';
  DEPS.forEach(d=>{
    const div=document.createElement('div');div.className='q';
    let h=`<div class="qt">${esc(L().q[d.key])}</div><div class="opts">`;
    d.opts.forEach(o=>{const sel=state.ans[d.key]===o.v?' sel':'';
      h+=`<span class="opt${sel}" onclick="setAns('${d.key}','${esc(o.v).replace(/'/g,"\\'")}')">${esc(opt(o.v))}</span>`;});
    h+=`</div>`;div.innerHTML=h;wrap.appendChild(div);
  });
}
function setAns(k,v){state.ans[k]=v;renderQuestions();renderOut();}

/* ================= Urteils-Engine ================= */
function evaluate(){
  const rows=DEPS.map(d=>{const o=getOpt(d.key);return {key:d.key,o};});
  const answered=rows.filter(r=>r.o);
  const stops=answered.filter(r=>r.o.s==="stop"&&r.key!=="test");
  const teils=answered.filter(r=>r.o.s==="teil"&&r.key!=="test");
  const testO=getOpt("test");
  const tested=testO&&testO.v==="Island-Mode jährlich getestet (geplante Trennung 4–8 h)";
  let cls,head,sub,hours=null;
  if(!answered.length){cls="";head="";sub="";}
  else if(stops.length){
    hours=Math.min(...stops.map(r=>r.o.h==null?72:r.o.h));
    cls="stop";head=L().verdict.stop(hours);sub=L().verdict.stopSub;
  } else if(teils.length||!tested){
    if(teils.length){cls="teil";head=L().verdict.deg;sub=L().verdict.degSub;}
    if(!teils.length&&!tested){cls="teil";head=L().verdict.okUntested;sub=L().verdict.okUntestedSub;}
    else if(!tested){head=L().verdict.okUntested;sub=L().verdict.okUntestedSub+" "+L().verdict.degSub;}
  } else {cls="ok";head=L().verdict.ok;sub=L().verdict.okSub;}
  return {rows,answered,stops,teils,tested,cls,head,sub,hours};
}
function statusPill(s){
  const c=s==="ok"?"var(--ok, #1d8a5f)":(s==="teil"?"var(--teil, #b97e0a)":"var(--offen, #d6246e)");
  return `<span class="pill" style="background:${c}">${L().statusW[s]}</span>`;
}
function fmtMoney(n){return n.toLocaleString(lang==="en"?"en-GB":"de-DE");}

/* ================= Rendering ================= */
function renderOut(){
  const T=L(),ev=evaluate();
  // Urteil
  let v="";
  if(ev.head){
    const col=ev.cls==="stop"?"var(--offen,#d6246e)":(ev.cls==="teil"?"var(--teil,#b97e0a)":"var(--ok,#1d8a5f)");
    v=`<div class="legalbox" style="border-color:${col}"><b style="font-size:15px">${esc(ev.head)}</b><br>${esc(ev.sub)}`;
    const rate=parseFloat(String(state.rate).replace(/\./g,'').replace(',','.'));
    if(ev.cls==="stop"&&isFinite(rate)&&rate>0&&ev.hours!=null){
      const sum=(72-ev.hours)*rate;
      v+=`<br><br><b>${esc(T.costRow(fmtMoney(sum),ev.hours,fmtMoney(rate)))}</b>`;
    }
    v+=`</div>`;
  }
  document.getElementById('verdict').innerHTML=v;

  // Steckbrief
  const date=fmtDate(state.datum)||"";
  const lt=state.lasttest?fmtDate(state.lasttest):T.never;
  const sorted=[...ev.rows].sort((a,b)=>{
    const rank=s=>s==="stop"?0:(s==="teil"?1:2);
    const ra=a.o?rank(a.o.s):3, rb=b.o?rank(b.o.s):3;
    if(ra!==rb)return ra-rb;
    const ha=a.o&&a.o.h!=null?a.o.h:999, hb=b.o&&b.o.h!=null?b.o.h:999;
    return ha-hb;
  });
  let rows="";
  sorted.forEach(r=>{
    const d=L().dep[r.key];
    if(!r.o){rows+=`<tr><td class="cjname">${esc(d)}</td><td colspan="3" style="color:var(--muted)">—</td></tr>`;return;}
    const wirkung=r.o.s==="ok"?T.hoursNone:(r.o.h==null?T.hoursNone:esc(T.hours(r.o.h)));
    const massnahme=r.o.s==="ok"?"":esc(L().m[r.key]);
    rows+=`<tr><td class="cjname">${esc(d)}<div style="font-weight:400;color:var(--muted);font-size:9px;margin-top:2px">${esc(opt(r.o.v))}</div></td><td>${statusPill(r.o.s)}</td><td style="white-space:nowrap">${wirkung}</td><td>${massnahme}</td></tr>`;
  });
  let verdictBand="";
  if(ev.head){verdictBand=`<div class="poster-intro"><b>${esc(ev.head)}</b> ${esc(ev.sub)}</div>`;}
  document.getElementById('poster').innerHTML=`
    <div class="poster-band"><span class="t">${T.pTitle}</span><span class="s">${esc(T.pSub(werkName()))}</span></div>
    ${verdictBand}
    <table class="ptable"><thead><tr>
      <th style="width:24%">${T.pTh[0]}</th><th style="width:11%">${T.pTh[1]}</th><th style="width:15%">${T.pTh[2]}</th><th style="width:50%">${T.pTh[3]}</th>
    </tr></thead><tbody>${rows}</tbody></table>
    <div class="poster-foot"><span>${T.pFoot1}</span><span>${esc(T.pFoot2(date,lt))}</span></div>`;

  // Maßnahmenliste
  const open=sorted.filter(r=>r.o&&r.o.s!=="ok");
  let acts=open.length
    ?`<ol>${open.map(r=>`<li><b>${esc(L().dep[r.key])}</b> ${r.o.h!=null?`(${esc(T.hours(r.o.h))})`:""} — ${esc(L().m[r.key])}</li>`).join('')}</ol>`
    :`<p class="note" style="margin-top:0">${esc(T.actNone)}</p>`;
  document.getElementById('actions').innerHTML=`<div class="stage"><div class="stagehead"><span class="st">${T.actH}</span></div><div class="stagebody">${acts}</div></div>`;
}

/* ================= Aktionen ================= */
function printPoster(){
  document.body.classList.add('printobs');
  const off=()=>{document.body.classList.remove('printobs');window.removeEventListener('afterprint',off);};
  window.addEventListener('afterprint',off);
  window.print();
  setTimeout(off,1500);
}
function exportCSV(){
  const T=L();
  const rows=DEPS.map(d=>{const o=getOpt(d.key);
    return [L().dep[d.key],o?opt(o.v):"",o?T.statusW[o.s]:"",o&&o.h!=null?o.h:"",o&&o.s!=="ok"?L().m[d.key]:""];});
  const csv=[T.csvHead,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\n");
  const blob=new Blob(["\ufeff"+csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=T.csvName;a.click();
}
function saveJSON(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='island-mode-stresstest.json';a.click();}
function loadJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);
    if(d&&d.ans){state.werk=d.werk||"";state.datum=d.datum||todayISO();state.rate=d.rate||"";state.lasttest=d.lasttest||"";
      DEPS.forEach(q=>{state.ans[q.key]=q.opts.some(o=>o.v===d.ans[q.key])?d.ans[q.key]:null;});
      syncFields();renderQuestions();renderOut();}
  }catch(err){alert(L().notRead);}};r.readAsText(f);e.target.value='';}
function syncFields(){[["werk","werk"],["datum","datum"],["rate","rate"],["lasttest","lasttest"]].forEach(([id,k])=>{const el=document.getElementById(id);if(el)el.value=state[k]||'';});}
